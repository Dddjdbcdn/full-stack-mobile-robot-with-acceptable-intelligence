local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0  
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true # follow odom
      transform_tolerance: 0.3

      # Size of the local costmap window and planning space
      width: 4
      height: 4
      resolution: 0.05 # cellsize
      footprint: "[[0.17, 0.17], [0.17, -0.17], [-0.17, -0.17], [-0.17, 0.17]]" # robot's shape
      footprint_padding: 0.05
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        
        # Add both your Lidar and Camera as sources
        observation_sources: scan pointcloud

        # Your existing Lidar config
        scan:
          topic: /scan
          max_obstacle_height: 0.4
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

        pointcloud:
          topic: /camera/depth/points 
          max_obstacle_height: 0.4 
          min_obstacle_height: 0.05
          clearing: True 
          marking: True  
          data_type: "PointCloud2"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.4 
          obstacle_max_range: 1.5
          obstacle_min_range: 0.4
          transform_tolerance: 0.5 

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0 # cost fall-off
        inflation_radius: 0.25 # obstacle avoidance radius

      always_send_full_costmap: true


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0  # Faster updates for obstacle detection
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[0.17, 0.17], [0.17, -0.17], [-0.17, -0.17], [-0.17, 0.17]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
  
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.4
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.5
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0  # Increased for maze navigation
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0  # Slightly reduced for smoother paths
        inflation_radius: 0.3

      always_send_full_costmap: true
      introspection_mode: "disabled"

planner_server:
  ros__parameters:
    allow_partial_planning: true  # Allow partial paths when blocked
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    introspection_mode: "disabled"
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3  # goal reaching precision
      use_astar: true # drop back to Dijkstra if A* is false
      allow_unknown: true

smoother_server: # smoothens the path
  ros__parameters:
    smoother_plugins: ["simple_smoother", "route_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      refinement_num: 2
      enforce_path_inversion: true
      do_refinement: true
    route_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      refinement_num: 5
      enforce_path_inversion: false
      do_refinement: true
  

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30 # maximum time to wait for the costmap to be updated
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.1 # time to retry before giving up
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]
    path_handler_plugins: ["PathHandler"]
    use_realtime_priority: false
    speed_limit_topic: "speed_limit"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15 # effort before giving up 
      movement_time_allowance: 3.0 # maximum time to plan before giving up

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      path_length_tolerance: 1.0

    PathHandler: # cut global plan into batches
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0 # distance of one patch
      enforce_path_inversion: true  # Prevent flipping back to old path
      enforce_path_rotation: false
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.785
      reject_unit_path: false

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56 # number of time steps for each batch
      model_dt: 0.05
      batch_size: 1000 # number of dreams per batch

      # Motor limits
      ax_max: 2.0
      ax_min: -2.0
      az_max: 2.0

      vx_max: 0.7
      vx_min: -0.7
      wz_max: 2.0

      # Noise to explore trajectories
      vx_std: 0.2
      wz_std: 0.4
   
      iteration_count: 1
      temperature: 0.2 # blend paths
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      publish_optimal_trajectory: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator: # validate the winner path
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0  # lookahead time to detect new obstacles  
        consider_footprint: true  # Whether to consider the full robot's footprint or just a point

      critics:
        [
          "ConstraintCritic", # motor constraints
          "GoalCritic", # goal reached
          "GoalAngleCritic", # goal pose angle
          "CostCritic", # costmap violation
          "PathAlignCritic", # path alignment
          "PathFollowCritic", # go further
          "PathAngleCritic", # path direction
          "PreferForwardCritic", # prefer forward
        ]

      # --- The Safety & Physical Limits ---
      ConstraintCritic:
        cost_weight: 1.0      # MUST be high/max to prevent violating motor limits
      CostCritic:
        cost_weight: 0.6      # Max priority: don't hit walls

      # --- The Goal Reaching ---
      GoalCritic:
        cost_weight: 0.8      # High priority: get to the destination
      GoalAngleCritic:
        cost_weight: 0.8      # High priority: face the right way at the end

      # --- The Path Following ---
      PathAlignCritic:
        critic_weight: 0.6    # Medium: Try to stay on the line, but yield to walls
      PathFollowCritic:
        critic_weight: 0.7    # Medium-Low: Chase the carrot down the path
      PathAngleCritic:
        critic_weight: 0.4    # Medium-Low: Keep the robot facing along the path

      # --- The Behavior Tweaks ---
      PreferForwardCritic:
        prefer_forward_weight: 0.5  # Low: Slight nudge to prevent unnecessary reversing
    

velocity_smoother: # subscriber to the cmd_vel_nav topic and publishes to the cmd_vel
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.7, 0.0, 2.0]
    min_velocity: [-0.7, 0.0, -2.0]
    max_accel: [2.0, 0.0, 2.0]
    max_decel: [-2.0, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor: # check collisions and publish to diff drive controller
  ros__parameters:
    enabled: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "/diff_drive_controller/cmd_vel_unstamped"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 0.8 # time to detect collision (shorter for faster response)
      simulation_time_step: 0.05 # smaller steps for more accurate collision detection
      min_points: 20 # fewer points for faster detection
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.15
      max_height: 0.4
      enabled: true

behavior_server: # for recovery behaviors
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      max_rotational_vel: 1.5  # faster recovery
      min_rotational_vel: 0.5
      rotational_acc_lim: 3.0
    backup:
      plugin: "nav2_behaviors/BackUp"
      acceleration_limit: 3.0
      deceleration_limit: -3.0
      minimum_speed: 0.15  # Faster backing up
      max_backup_distance: 0.4 
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

lifecycle_manager_localization:
  ros__parameters:
    autostart: true
    node_names: ['map_server', 'amcl']

lifecycle_manager_navigation: 
  ros__parameters:
    autostart: true
    node_names: [
      'controller_server',
      'smoother_server',
      'planner_server',
      'behavior_server',
      'bt_navigator',
      'waypoint_follower',
      'velocity_smoother'
    ]

lifecycle_manager_collision:
  ros__parameters:
    autostart: true
    node_names: ['collision_monitor']

bt_navigator: # manage the behavior tree via Actions and Services
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom
    bt_loop_duration: 10
    filter_duration: 0.3
    default_server_timeout: 20
    default_cancel_timeout: 10  # Cancel faster when stuck
    wait_for_service_timeout: 1000
    enable_groot_monitoring: false
    enable_nav_to_pose_action: true
    enable_compute_path_through_poses_action: true
    enable_compute_path_to_pose_action: true
    enable_follow_path_action: true
    introspection_mode: "disabled"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1667
      search_window: 2.0
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1669
      search_window: 2.0
    bt_search_directories:
      - $(find-pkg-share nav2_bt_navigator)/behavior_trees

    # calling actions
    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_object
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - route
      - spin
      - smoother
      - undock_robot
      - wait

